<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" (click)="closeModal()">
  <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden transform transition-all" (click)="$event.stopPropagation()">
    
    <div class="flex items-center justify-between p-4 border-b border-gray-100">
      <h3 class="text-lg font-bold text-[#581056]">{{ title }}</h3>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600 p-2 text-2xl">&times;</button>
    </div>

    <div class="p-6">
      <ng-content></ng-content>
    </div>
  </div>
</div>
