<div 
  *ngIf="isOpen" 
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm"
  (click)="closeModal()"
>
  <div 
    class="bg-white w-full max-w-sm rounded-2xl shadow-xl overflow-hidden transform transition-all"
    (click)="$event.stopPropagation()" 
  >
    <div class="flex items-center justify-between p-4 border-b border-gray-100">
      <h3 class="text-lg font-bold text-[#581056]">{{ title }}</h3>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600 p-1">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="p-6">
      <ng-content></ng-content>
    </div>
  </div>
</div>
