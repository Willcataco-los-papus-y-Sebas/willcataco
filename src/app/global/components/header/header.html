<header
  class="bg-primary dark:bg-primary-dark w-full fixed lg:max-w-none"
  [ngClass]="{
            'h-[130px]': is_normal,
            'h-[230px]': !is_normal
        }">
  <div class="pt-[55px] flex justify-between items-start px-6 ml-2 relative">
    @if(buttons_on){
    <app-button-header></app-button-header>
    }@else{
    <div class="h-[32px] w-[32px]"></div>
    } @if(is_logo){
    <div class="flex flex-col items-center gap-6">
      <img
        alt="logo"
        src="assets/{{logo}}.svg"
        class="h-[80px] w-[80px] h-max-[120px] w-max-[110]" />
      <div class="flex-1 text-center max-w-[200px] flex justify-center items-start lg:max-w-none">
        <p class="text-background text-subtitle font-sans break-words lg:text-[28px]">
          {{header_text}}
        </p>
      </div>
    </div>
    }@else{
    <div class="flex-1 text-center max-w-[200px] flex justify-center lg:max-w-none">
      <p class="text-background text-title font-sans break-words lg:text-[20px]">{{header_text}}</p>
    </div>
    } @if(buttons_on){
    <app-button-header icon="logout"></app-button-header>
    }@else{
    <div class="h-[32px] w-[32px]"></div>
    }
  </div>
  @if(has_design) {
  <!--Para usar cualquier svg, agrega preserveAspectRatio="none" en tu archiv.svg, dentro de la etiqueta <svg> uwu-->
  <img
    alt="image"
    src="assets/{{design}}.svg"
    class="w-full h-[80px] sm:h-[100px] lg:h-[120px] dark:hidden" />
  <img
    alt="image"
    src="assets/{{dark_design}}.svg"
    class="w-full h-[80px] sm:h-[100px] lg:h-[120px] dark:block hidden" />
  }
</header>
