<div class="flex flex-col w-full gap-2 mb-4">
  @if(label){
  <label [for]="id" class="text-[#370936] font-sans font-bold text-lg ml-2">{{ label }}</label>
  }

  <input
    [id]="id"
    [type]="type"
    [placeholder]="placeholder"
    [value]="value"
    class="w-full h-[50px] px-4 border-2 border-[#581056] rounded-xl text-[#370936] placeholder-[#581056]/50 font-sans focus:outline-none focus:bg-purple-50 transition-colors" />
</div>
