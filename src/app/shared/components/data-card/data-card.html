<div
  class="w-full bg-background dark:bg-secondaryBackground-dark rounded-xl p-4 shadow-sm border border-secondary/10 dark:border-secondary-dark/10 flex justify-between items-start transition-colors duration-200">
  <div class="flex flex-col gap-1">
    <h3 class="font-sans font-bold text-title text-secondary dark:text-secondary-dark">
      {{ firstLine }}
    </h3>
    <p class="font-sans text-body text-secondary/80 dark:text-secondary-dark/80">
      {{ secondLine }}
    </p>
    <p class="font-sans text-body text-secondary/60 text-xs dark:text-secondary-dark/60">
      {{ thirdLine }}
    </p>
  </div>

  <div class="flex-shrink-0">
    <ng-content select="[card-action]"></ng-content>
  </div>
</div>
