<div class="w-full min-h-full bg-background dark:bg-background-dark flex flex-col pt-2">
  <div class="flex flex-col w-full max-w-2xl mx-auto px-4">
    <button
      (click)="goTo('multas')"
      class="w-full flex items-center gap-4 py-4 border-b border-disabled/30 dark:border-disabled-dark/30 hover:bg-secondaryBackground dark:hover:bg-secondaryBackground-dark transition-colors text-left">
      <div
        class="h-6 w-6 text-secondary/70 dark:text-secondary-dark/70 bg-current"
        style="
          mask-image: url(assets/document-text.svg);
          mask-size: 80%;
          mask-repeat: no-repeat;
          mask-position: center;
          -webkit-mask-image: url(assets/document-text.svg);
          -webkit-mask-size: 80%;
          -webkit-mask-repeat: no-repeat;
          -webkit-mask-position: center;
        "></div>
      <span class="font-sans text-body text-secondary dark:text-secondary-dark flex-1">Multas</span>
    </button>

    <button
      (click)="goTo('costos')"
      class="w-full flex items-center gap-4 py-4 hover:bg-secondaryBackground dark:hover:bg-secondaryBackground-dark transition-colors text-left">
      <div
        class="h-6 w-6 text-secondary/70 dark:text-secondary-dark/70 bg-current"
        style="
          mask-image: url(assets/currency-dollar.svg);
          mask-size: contain;
          mask-repeat: no-repeat;
          mask-position: center;
          -webkit-mask-image: url(assets/currency-dollar.svg);
          -webkit-mask-size: contain;
          -webkit-mask-repeat: no-repeat;
          -webkit-mask-position: center;
        "></div>
      <span class="font-sans text-body text-secondary dark:text-secondary-dark flex-1">Costos</span>
    </button>
  </div>
</div>
