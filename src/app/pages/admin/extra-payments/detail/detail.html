<div class="relative px-4" style="margin-top: -60px; z-index: 20;">
    
    @if (loading()) {
        <div class="bg-white rounded-2xl shadow-xl p-8 text-center min-h-[300px] flex items-center justify-center">
            <p class="text-sm text-gray-500">Cargando información...</p>
        </div>
    } @else if (payment(); as p) {
        
        <div class="bg-white rounded-2xl shadow-xl p-8 min-h-[500px] flex flex-col items-center w-full max-w-md mx-auto">
            
            <h2 class="text-xl font-bold text-black mb-8 text-center">{{ p.name }}</h2>

            <div class="w-full space-y-6">
                
                <div class="flex flex-col gap-1">
                    <span class="font-bold text-black">Descripción:</span>
                    <span class="text-gray-600">{{ p.description || 'Sin descripción' }}</span>
                </div>

                <div class="flex flex-col gap-1">
                    <span class="font-bold text-black">Monto:</span>
                    <span class="text-gray-600">{{ p.amount | currency:'Bs ' }}</span>
                </div>

                <div class="flex items-center gap-2">
                    <span class="font-bold text-black">Estado:</span>
                    <span class="px-3 py-1 rounded-full text-xs text-white font-bold"
                          [class.bg-green-600]="p.is_active"
                          [class.bg-red-600]="!p.is_active">
                        {{ p.is_active ? 'Activo' : 'Inactivo' }}
                    </span>
                </div>

                <div class="flex flex-col gap-1">
                    <span class="font-bold text-black">Fecha Creación:</span>
                    <span class="text-gray-600">{{ p.created_at | date:'dd/MM/yyyy' }}</span>
                </div>
            </div>

            <div class="mt-auto pt-10">
                <app-button variant="primary" size="md">Ver Pagos</app-button>
            </div>
        </div>
    }
</div>
