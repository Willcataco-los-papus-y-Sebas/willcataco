<div class="h-full flex flex-col bg-background">
  <app-header></app-header>
  <div class="relative -mt-24 z-[60]">
    <app-carrusel [items]="carruselItems()" [colorItem]="'bg-background'"></app-carrusel>
    <div class="flex justify-center mt-2">
      <app-status-badge
        [status]="totalDebt() > 0 ? 'debt' : 'paid'"
        [label]="totalDebt() > 0 ? 'Pendiente' : 'Pagado'"></app-status-badge>
    </div>
  </div>

  <div class="flex-1 overflow-auto p-4 flex flex-col gap-4">
    <div class="flex gap-2">
      <button
        (click)="setTab('PAID')"
        [class.bg-primary]="activeTab() === 'PAID'"
        [class.text-white]="activeTab() === 'PAID'"
        [class.bg-white]="activeTab() !== 'PAID'"
        [class.text-primary]="activeTab() !== 'PAID'"
        class="px-6 py-2 rounded-full font-bold shadow-sm transition-colors flex-1">
        Hechas
      </button>
      <button
        (click)="setTab('UNPAID')"
        [class.bg-primary]="activeTab() === 'UNPAID'"
        [class.text-white]="activeTab() === 'UNPAID'"
        [class.bg-white]="activeTab() !== 'UNPAID'"
        [class.text-primary]="activeTab() !== 'UNPAID'"
        class="px-6 py-2 rounded-full font-bold shadow-sm transition-colors flex-1">
        Deudas
      </button>
    </div>

    <div class="flex flex-col gap-3">
      @for (payment of filteredPayments(); track payment.id) {
      <div
        class="bg-white rounded-xl p-4 shadow-sm flex justify-between items-center border-b-[3px] border-gray-100">
        <div class="flex flex-col gap-0.5">
          <span class="font-bold text-sm">Medidor: {{ payment.meter_id }}</span>
          <span class="text-xs text-gray-500">Lectura: ...</span>
          <span class="text-xs text-gray-500">
            Fecha: {{ payment.created_at | date:'dd/MM/yyyy' }}
          </span>
        </div>

        <div class="flex flex-col items-end gap-2">
          <span class="font-bold">Bs. {{ payment.amount }}</span>
          <app-status-badge
            [status]="payment.status === 'PAID' ? 'paid' : 'debt'"
            [label]="payment.status === 'PAID' ? 'Pagado' : 'Pendiente'"></app-status-badge>
        </div>
      </div>
      } @empty {
      <div class="text-center py-8 text-gray-400">
        No hay registros {{ activeTab() === 'PAID' ? 'pagados' : 'pendientes' }}.
      </div>
      }
    </div>
  </div>
</div>
