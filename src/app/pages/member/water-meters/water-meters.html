<div class="flex flex-col pb-24 w-full max-w-md mx-auto px-4 mb-8 pt-6">
    <div class="space-y-6">
        <div class="flex flex-col bg-background dark:bg-secondaryBackground-dark p-4 rounded-xl shadow-sm border border-secondary/10 dark:border-secondary-dark/10 items-center gap-4">
            <span class="text-subtitle">Usted posee más de un medidor.</span>
            <span class="text-subtitle">Por favor seleccione uno</span>
        </div>

        <div class="border-b-2 border-primary dark:border-primary-dark w-full opacity-20 mb-4"></div>
    </div>
  <div class="flex flex-col gap-3">
    @for (meter of waterMeters(); track meter.id) {
      <div 
        class="bg-background dark:bg-secondaryBackground-dark p-4 rounded-xl shadow-sm border border-secondary/10 dark:border-secondary-dark/10 flex items-center gap-4 transition-transform hover:scale-[1.01] duration-200"
        role="button"
        (click)="navigateToPayments(meter.id)">
        <div
            class="flex items-center justify-center w-10 h-10 rounded-full shrink-0 bg-success/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-speedometer2 text-success" viewBox="0 0 16 16">
              <path d="M8 4a.5.5 0 0 1 .5.5V6a.5.5 0 0 1-1 0V4.5A.5.5 0 0 1 8 4M3.732 5.732a.5.5 0 0 1 .707 0l.915.914a.5.5 0 1 1-.708.708l-.914-.915a.5.5 0 0 1 0-.707M2 10a.5.5 0 0 1 .5-.5h1.586a.5.5 0 0 1 0 1H2.5A.5.5 0 0 1 2 10m9.5 0a.5.5 0 0 1 .5-.5h1.5a.5.5 0 0 1 0 1H12a.5.5 0 0 1-.5-.5m.754-4.246a.39.39 0 0 0-.527-.02L7.547 9.31a.91.91 0 1 0 1.302 1.258l3.434-4.297a.39.39 0 0 0-.029-.518z"/>
              <path fill-rule="evenodd" d="M0 10a8 8 0 1 1 15.547 2.661c-.442 1.253-1.845 1.602-2.932 1.25C11.309 13.488 9.475 13 8 13c-1.474 0-3.31.488-4.615.911-1.087.352-2.49.003-2.932-1.25A8 8 0 0 1 0 10m8-7a7 7 0 0 0-6.603 9.329c.203.575.923.876 1.68.63C4.397 12.533 6.358 12 8 12s3.604.532 4.923.96c.757.245 1.477-.056 1.68-.631A7 7 0 0 0 8 3"/>
            </svg>
        </div>
        <div class="flex-1 min-w-0">
            <h3
              class="font-semibold text-sm text-secondary dark:text-secondary-dark truncate font-sans">
              ID medidor: {{ meter.id }}
            </h3>
            <p class="text-xs text-secondary/50 dark:text-secondary-dark/50 font-sans mt-0.5">
              Lectura actual: {{ meter.reading }} m³
            </p>
          </div>
      </div>
    }
  </div>
</div>
