<div class="px-6 py-8 md:px-12 md:py-16 max-w-4xl mx-auto flex flex-col gap-12">
  <section>
    <app-panel>
      <div class="flex flex-col gap-6">
        <h2 class="text-2xl font-bold text-secondary dark:text-secondary-dark">Ingreso de Socios</h2>

        <form (ngSubmit)="onLogin()" class="flex flex-col gap-4">
          <app-input
            name="username"
            label="Usuario"
            placeholder="Ingresa tu usuario"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"></app-input>

          <app-input
            name="password"
            label="Contraseña"
            type="password"
            placeholder="Ingresa tu contraseña"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"></app-input>

          <div class="flex flex-col items-center gap-4 mt-2">
            <app-button variant="primary" size="lg" class="md:w-auto">Ingresar</app-button>

            <p class="text-sm text-secondary dark:text-secondary-dark">
              ¿Olvidaste tu contraseña?
              <a
                href="#"
                class="text-primary dark:text-primary-dark font-semibold hover:text-hover dark:hover:text-hover-dark transition-colors">
                Recuperar
              </a>
            </p>
          </div>
        </form>
      </div>
    </app-panel>
  </section>

  <section class="flex flex-col gap-6">
    <h2 class="text-2xl font-bold text-secondary dark:text-secondary-dark">Sobre Nosotros</h2>

    <app-info-section title="Mision" [content]="missionText"></app-info-section>

    <app-info-section title="Vision" [content]="visionText"></app-info-section>
  </section>
</div>
