<div class="px-6 py-8 md:px-12 md:py-16 max-w-4xl mx-auto flex flex-col gap-12">
  <section>
    <app-panel>
      <div class="flex flex-col gap-6">
        <h2 class="text-2xl font-bold text-secondary dark:text-secondary-dark">Ingreso Datos</h2>

        <form (ngSubmit)="onSendPayload()" class="flex flex-col gap-4">
          <app-input
            name="email"
            label="Correo"
            placeholder="Ingrese su correo electronico"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"></app-input>
          <div class="flex flex-col items-center gap-4 mt-2">
            <app-button type="submit" variant="primary" size="lg" class="md:w-auto">
              Enviar
            </app-button>
          </div>
        </form>
      </div>
    </app-panel>
  </section>
</div>
